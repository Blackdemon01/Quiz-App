<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f8ff;
margin:0;
text-align:center;
}

header{
background:#003366;
color:white;
padding:25px;
}

.container{
padding:30px;
}

button{
background:#0057b8;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#003f87;
}
</style>
</head>

<body>

<header>
<h1>📚 Quiz App</h1>
<p>Test Your Knowledge</p>
</header>

<div class="container">

<h2>Welcome!</h2>

<p>Practice WAEC, JAMB and Post-UTME questions.</p>

<input
id="studentName"
type="text"
placeholder="Enter your name"
style="width:80%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;">

<br><br>

<button onclick="startQuiz()">
Start Quiz
</button>

<script>
function startQuiz(){

let name=document.getElementById("studentName").value;

if(name==""){
alert("Please enter your name.");
return;
}

alert("Welcome "+name+"! Get ready for your quiz.");
}
</script>
