<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎓 CBT Quiz App</h1>

<p class="subtitle">

Practice WAEC • JAMB • Post UTME

</p>

<div id="home">

<input
type="text"
id="studentName"
placeholder="Enter Your Name">

<select id="subject">

<option value="">Select Subject</option>

<option value="math">Mathematics</option>

<option value="english">English Language</option>

<option value="physics">Physics</option>

<option value="chemistry">Chemistry</option>

<option value="biology">Biology</option>

</select>

<button onclick="startQuiz()">

Start Quiz

</button>

</div>

<div id="quiz" style="display:none;">

<h2 id="subjectTitle"></h2>

<p id="counter"></p>

<h3 id="question"></h3>

<div id="options"></div>

<button id="nextBtn" onclick="nextQuestion()">

Next Question

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html><option>Government</option>

<option>Economics</option>

<option>Geography</option>

</select>

<br>

<button onclick="startQuiz()">

Start Quiz

</button>

<div id="quiz">

<h2 id="question"></h2>

<button class="option" onclick="answer(0)" id="op0"></button>

<button class="option" onclick="answer(1)" id="op1"></button><button class="option" onclick="answer(2)" id="op2"></button>

<button class="option" onclick="answer(3)" id="op3"></button>

<p id="score"></p>

</div>

<script>

let questions=[
{
question:"What is 2 + 2 ?",
options:["3","4","5","6"],
correct:1
},
{
question:"Capital of Nigeria?",
options:["Abuja","Lagos","Kano","Ibadan"],
correct:0
},
{
question:"5 × 6 = ?",
options:["25","30","35","40"],
correct:1
},
{
question:"HTML stands for?",
options:[
"Hyper Text Markup Language",
"Home Tool Markup Language",
"High Text Machine Language",
"Hyper Transfer Markup Language"
],
correct:0
},
{
question:"Which planet is called the Red Planet?",
options:["Earth","Mars","Venus","Jupiter"],
correct:1
}
];

let current=0;
let score=0;

function startQuiz(){

let name=document.getElementById("studentName").value;

let subject=document.getElementById("subject").value;

if(name=="" || subject==""){
alert("Please enter your name and select a subject.");
return;
}

document.getElementById("quiz").style.display="block";

loadQuestion();
}

function loadQuestion(){

document.getElementById("question").innerHTML=questions[current].question;

for(let i=0;i<4;i++){

document.getElementById("op"+i).innerHTML=questions[current].options[i];

}

}function answer(choice){

if(choice==questions[current].correct){

score++;

}

current++;

if(current<questions.length){

loadQuestion();

}else{

document.getElementById("quiz").innerHTML=
"<h2>Quiz Completed!</h2>"+
"<h3>Your Score: "+score+" / "+questions.length+"</h3>"+
"<p>Thanks for taking the quiz.</p>";

}

}

</script>

</div>

</body>

</html>
